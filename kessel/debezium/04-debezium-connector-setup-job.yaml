apiVersion: batch/v1
kind: Job
metadata:
  name: acm-kessel-debezium-setup
  namespace: rbac-local
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: quay.io/curl/curl:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Debezium Connect to be ready..."
          for i in $(seq 1 60); do
            if curl -s http://acm-kessel-debezium:8083/ > /dev/null 2>&1; then
              echo "Debezium Connect is ready"
              break
            fi
            echo "Waiting... ($i/60)"
            sleep 5
          done

          echo "Checking for existing connector..."
          EXISTING=$(curl -s http://acm-kessel-debezium:8083/connectors | grep -o "inventory-debezium-connector" || true)

          if [ -n "$EXISTING" ]; then
            echo "Connector already exists, deleting..."
            curl -X DELETE http://acm-kessel-debezium:8083/connectors/inventory-debezium-connector
            sleep 2
          fi

          echo "Creating Debezium connector..."
          RETRY_COUNT=0
          MAX_RETRIES=30
          until [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -w "\n%{http_code}" -d @/config/debezium-connector.json \
              -H "Content-Type: application/json" \
              -X POST \
              http://acm-kessel-debezium:8083/connectors)

            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
              echo "Connector created successfully"
              echo "$BODY"
              break
            elif echo "$BODY" | grep -q "Connection to.*refused"; then
              RETRY_COUNT=$((RETRY_COUNT+1))
              echo "PostgreSQL not ready yet, retrying ($RETRY_COUNT/$MAX_RETRIES)..."
              sleep 10
            else
              echo "Failed to create connector (HTTP $HTTP_CODE):"
              echo "$BODY"
              exit 1
            fi
          done

          if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
            echo "Max retries reached, PostgreSQL still not available"
            exit 1
          fi

          echo "Connector setup complete"
        volumeMounts:
        - name: connector-config
          mountPath: /config
          readOnly: true
      volumes:
      - name: connector-config
        configMap:
          name: acm-kessel-debezium-connector
