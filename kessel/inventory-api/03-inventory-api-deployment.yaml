apiVersion: apps/v1
kind: Deployment
metadata:
  name: acm-kessel-inventory-api
  namespace: rbac-local
  labels:
    app: acm-kessel-inventory-api
    app.kubernetes.io/name: inventory-api
    app.kubernetes.io/component: kessel
    app.kubernetes.io/part-of: acm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acm-kessel-inventory-api
  template:
    metadata:
      labels:
        app: acm-kessel-inventory-api
    spec:
      initContainers:
      - name: migration
        image: quay.io/redhat-services-prod/project-kessel-tenant/kessel-inventory/inventory-api:latest
        command: ["inventory-api", "migrate"]
        env:
        - name: INVENTORY_API_CONFIG
          value: "/inventory/inventory-api-config.yaml"
        volumeMounts:
        - name: config-volume
          mountPath: /inventory
          readOnly: true
      containers:
      - name: inventory-api
        image: quay.io/redhat-services-prod/project-kessel-tenant/kessel-inventory/inventory-api:latest
        command: ["inventory-api", "serve"]
        ports:
        - name: grpc
          containerPort: 9000
          protocol: TCP
        env:
        - name: INVENTORY_API_CONFIG
          value: "/inventory/inventory-api-config.yaml"
        - name: RESOURCE_DIR
          value: "/data/schema/resources"
        - name: INVENTORY_API_AUTHZ_KESSEL_URL
          value: "acm-kessel-relations-api.rbac-local.svc.cluster.local:9000"
        volumeMounts:
        - name: config-volume
          mountPath: /inventory
          readOnly: true
        - name: schema-cache
          mountPath: /schema_cache.json
          subPath: schema_cache.json
          readOnly: true
      volumes:
      - name: config-volume
        secret:
          secretName: acm-kessel-inventory-api-config
      - name: schema-cache
        configMap:
          name: acm-kessel-schema-cache
