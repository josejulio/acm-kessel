apiVersion: v1
kind: ConfigMap
metadata:
  name: rbac-config
  namespace: rbac-local
data:
  # Database
  DATABASE_SERVICE_NAME: "POSTGRES_SQL"
  DATABASE_ENGINE: "postgresql"
  DATABASE_NAME: "rbac"
  POSTGRES_SQL_SERVICE_HOST: "rbac-db"
  POSTGRES_SQL_SERVICE_PORT: "5432"
  DATABASE_HOST: "rbac-db"
  DATABASE_PORT: "5432"
  DATABASE_USER: "rbacuser"
  DATABASE_PASSWORD: "postgres"

  # App
  API_PATH_PREFIX: "/api/rbac"
  DJANGO_LOG_HANDLERS: "console"
  DJANGO_READ_DOT_ENV_FILE: "False"

  # Dev mode - bypasses authentication
  DEVELOPMENT: "True"
  BYPASS_BOP_VERIFICATION: "True"

  # Redis
  REDIS_HOST: "rbac-redis"

  # Kafka - enabled for consumer
  CLOWDER_ENABLED: "false"
  KAFKA_ENABLED: "True"
  KAFKA_BOOTSTRAP_SERVERS: "rbac-local-kafka.rbac-local.svc.cluster.local:9092"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
  RBAC_KAFKA_CONSUMER_TOPIC: "rbac-consumer-replication-event"
  RBAC_KAFKA_CONSUMER_GROUP_ID: "rbac-consumer-group"
  RBAC_KAFKA_CUSTOM_CONSUMER_BROKER: "rbac-local-kafka.rbac-local.svc.cluster.local:9092"

  # Kessel - enabled for replication to Relations API
  REPLICATION_TO_RELATION_ENABLED: "True"
  RELATION_API_SERVER: "acm-kessel-relations-api:9000"
  INVENTORY_API_SERVER: "acm-kessel-inventory-api:9000"
  PRINCIPAL_USER_DOMAIN: "redhat"

  # V2 config
  SYSTEM_DEFAULT_ROOT_WORKSPACE_ROLE_UUID: "23592f00-71f7-482d-be2c-e82eeb704406"
  SYSTEM_DEFAULT_TENANT_ROLE_UUID: "d8e9d8c6-1edf-41b8-951d-805e9e701f49"
  SYSTEM_ADMIN_ROOT_WORKSPACE_ROLE_UUID: "411ef1a0-75a8-4765-8e9f-377297e8ee28"
  SYSTEM_ADMIN_TENANT_ROLE_UUID: "a62b9113-593d-471b-96aa-971d6e748a9b"
  WORKSPACE_HIERARCHY_DEPTH_LIMIT: "5"
  WORKSPACE_ORG_CREATION_LIMIT: "20000000"
  V2_APIS_ENABLED: "True"
  V2_READ_ONLY_API_MODE: "False"
  V2_EDIT_API_ENABLED: "True"
  V2_BOOTSTRAP_TENANT: "True"
  WORKSPACE_HIERARCHY_ENABLED: "True"

  # Seeding
  PERMISSION_SEEDING_ENABLED: "True"
  ROLE_SEEDING_ENABLED: "True"
  GROUP_SEEDING_ENABLED: "True"
  ROLE_CREATE_ALLOW_LIST: "rbac,acm"
